name: ChunkGuardTestKit
version: "1.0"
main: io.github.kuohsuanlo.chunkguard.testkit.ChunkGuardTestKit
api-version: "1.21"
load: POSTWORLD
description: Validation harness that reproduces the low-heap chunk-load-failure condition ChunkGuardAgent guards against.
commands:
  heapfill:
    description: apply a transient, self-releasing heap load for N seconds
    usage: /heapfill [seconds] [threads] [mbPerAlloc]
  heaprelease:
    description: release the retained memory immediately
  reloadchunk:
    description: force a fresh chunk load under a fixed heap headroom (validation only)
    usage: /reloadchunk <cx> <cz> [headroomMB] [world]
  holdchunk:
    description: hold an async full-level plugin chunk ticket (player-like driver for fake-full repro)
    usage: /holdchunk <cx> <cz> [world]
  releasechunk:
    description: release the plugin chunk ticket
    usage: /releasechunk <cx> <cz> [world]
  setmileage:
    description: overwrite a loaded chunk InhabitedTime and mark unsaved (fake-full state factory)
    usage: /setmileage <cx> <cz> <ticks> [world]
